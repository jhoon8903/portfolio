<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>WigglePuzzle — WebGL</title>
    <style>
      html, body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
      /* 컨테이너 전체를 채우고, 9:16 캔버스를 중앙에 맞춰 스케일(레터박스).
         → 430x760 모달이든 풀스크린이든 비율 유지하며 들어맞음. (빌드는 720x1280 렌더, 표시만 축소) */
      #unity-container { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; }
      #unity-canvas { height:100%; aspect-ratio:9 / 16; max-width:100%; background:#231F20; display:block; touch-action:none; }
      @media (max-aspect-ratio: 9 / 16) { #unity-canvas { width:100%; height:auto; } }
    </style>
  </head>
  <body>
    <div id="unity-container"><canvas id="unity-canvas" tabindex="-1"></canvas></div>
    <script src="Build/WiggleWebGL.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/WiggleWebGL.data.unityweb",
        frameworkUrl: "Build/WiggleWebGL.framework.js.unityweb",
        codeUrl: "Build/WiggleWebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Rocketdan Games",
        productName: "WigglePuzzle",
        productVersion: "0.0.4",
      }).catch((message) => { alert(message); });
    </script>
  </body>
</html>
